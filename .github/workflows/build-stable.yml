name: Build Stable

on:
  schedule:
    - cron: "0 8 * * TUE"  # Weekly on Tuesdays at 8:00 UTC
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: bluefin-dx
            image_name: bluefin-niri
          - base_image: bluefin-dx-nvidia-open
            image_name: bluefin-niri-nvidia

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Checkout
        uses: actions/checkout@v4

      - name: Get base image version
        id: base_version
        run: |
          BASE_IMAGE="ghcr.io/ublue-os/${{ matrix.base_image }}:stable"
          VERSION=$(skopeo inspect docker://${BASE_IMAGE} | jq -r '.Labels["org.opencontainers.image.version"]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate tags and version
        id: tags
        run: |
          DATE=$(date +%Y%m%d)
          echo "date_tag=stable-${DATE}" >> $GITHUB_OUTPUT
          echo "stable_tag=stable" >> $GITHUB_OUTPUT

          # Determine variant suffix
          if [[ "${{ matrix.image_name }}" == *"-nvidia"* ]]; then
            SUFFIX="niri-nvidia"
          else
            SUFFIX="niri"
          fi

          # Compose version: base_version.suffix.date
          CUSTOM_VERSION="${{ steps.base_version.outputs.version }}.${SUFFIX}.${DATE}"
          echo "custom_version=${CUSTOM_VERSION}" >> $GITHUB_OUTPUT

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ matrix.image_name }}
          tags: |
            ${{ steps.tags.outputs.stable_tag }}
            ${{ steps.tags.outputs.date_tag }}
          build-args: |
            BASE_IMAGE=ghcr.io/ublue-os/${{ matrix.base_image }}
            TAG=stable
          labels: |
            org.opencontainers.image.version=${{ steps.tags.outputs.custom_version }}
          oci: true

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
