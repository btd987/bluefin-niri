# ThinkPad fan control via thinkfan
# Uses coretemp CPU package temp + tpacpi fan interface

sensors:
  - hwmon: /sys/class/hwmon
    name: coretemp
    indices: [1]

fans:
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - [0, 0, 55]
  - [1, 50, 60]
  - [2, 55, 65]
  - [3, 60, 70]
  - [5, 65, 75]
  - [7, 70, 85]
  - ["level auto", 80, 90]
  - ["level disengaged", 85, 255]
