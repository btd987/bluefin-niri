name: Cleanup

on:
  schedule:
    - cron: "0 0 * * SUN"  # Weekly on Sundays at midnight UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          - bluefin-niri
          - bluefin-niri-nvidia

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
          ignore-versions: "^(stable|stable-daily)$"
