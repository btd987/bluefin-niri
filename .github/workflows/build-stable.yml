name: Build Stable

on:
  schedule:
    - cron: "0 8 * * TUE"  # Weekly on Tuesdays at 8:00 UTC
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: bluefin-dx
            image_name: bluefin-niri
          - base_image: bluefin-dx-nvidia-open
            image_name: bluefin-niri-nvidia

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tags
        id: tags
        run: |
          DATE=$(date +%Y%m%d)
          echo "date_tag=stable-${DATE}" >> $GITHUB_OUTPUT
          echo "stable_tag=stable" >> $GITHUB_OUTPUT

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ matrix.image_name }}
          tags: |
            ${{ steps.tags.outputs.stable_tag }}
            ${{ steps.tags.outputs.date_tag }}
          build-args: |
            BASE_IMAGE=ghcr.io/ublue-os/${{ matrix.base_image }}
            TAG=stable
          oci: true

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
