name: Build

on:
  schedule:
    - cron: "0 5 * * TUE"  # Weekly stable (after upstream 1:00 UTC)
    - cron: "0 12 * * *"   # Daily stable-daily (midday to catch upstream updates)
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      channel:
        description: "Build channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - stable-daily

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: ghcr.io/ublue-os/bluefin-dx
            image_name: bluefin-niri
            base_tag_stable: stable
            base_tag_daily: stable-daily
          - base_image: ghcr.io/ublue-os/bluefin-dx-nvidia-open
            image_name: bluefin-niri-nvidia
            base_tag_stable: stable
            base_tag_daily: stable-daily
          - base_image: ghcr.io/ublue-os/bazzite
            image_name: bazzite-niri
            base_tag_stable: stable
            base_tag_daily: latest
          - base_image: ghcr.io/ublue-os/bazzite-nvidia
            image_name: bazzite-niri-nvidia
            base_tag_stable: stable
            base_tag_daily: latest
          - base_image: quay.io/fedora/fedora-sway-atomic
            image_name: fedora-44-niri
            base_tag_stable: "44"
            base_tag_daily: "44"

    steps:
      - name: Determine channel
        id: channel
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ inputs.channel }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "0 5 * * TUE" ]]; then
              CHANNEL="stable"
            else
              CHANNEL="stable-daily"
            fi
          else
            # Push events use stable-daily
            CHANNEL="stable-daily"
          fi
          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT

          # Resolve upstream base tag (Bazzite uses 'latest' instead of 'stable-daily')
          if [[ "${CHANNEL}" == "stable" ]]; then
            echo "base_tag=${{ matrix.base_tag_stable }}" >> $GITHUB_OUTPUT
          else
            echo "base_tag=${{ matrix.base_tag_daily }}" >> $GITHUB_OUTPUT
          fi

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Checkout
        uses: actions/checkout@v6

      - name: Get base image version
        id: base_version
        run: |
          BASE_IMAGE="${{ matrix.base_image }}:${{ steps.channel.outputs.base_tag }}"
          VERSION=$(skopeo inspect docker://${BASE_IMAGE} | jq -r '.Labels["org.opencontainers.image.version"]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate tags and version
        id: tags
        run: |
          DATE=$(date +%Y%m%d)
          CHANNEL="${{ steps.channel.outputs.channel }}"

          echo "channel_tag=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "date_tag=${CHANNEL}-${DATE}" >> $GITHUB_OUTPUT

          # Determine variant suffix
          if [[ "${{ matrix.image_name }}" == *"-nvidia"* ]]; then
            SUFFIX="niri-nvidia"
          else
            SUFFIX="niri"
          fi

          # Compose version: base_version.suffix.date
          CUSTOM_VERSION="${{ steps.base_version.outputs.version }}.${SUFFIX}.${DATE}"
          echo "custom_version=${CUSTOM_VERSION}" >> $GITHUB_OUTPUT

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ matrix.image_name }}
          tags: |
            ${{ steps.tags.outputs.channel_tag }}
            ${{ steps.tags.outputs.date_tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            TAG=${{ steps.channel.outputs.base_tag }}
            VARIANT=${{ matrix.image_name }}
          labels: |
            org.opencontainers.image.version=${{ steps.tags.outputs.custom_version }}
          oci: true

      - name: Login to GHCR
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
